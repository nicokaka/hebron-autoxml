name: Build Windows Executable

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  # Permite que você clique num botão no GitHub para gerar quando quiser:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller HebronAutoXML.spec

    - name: Upload .exe as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HebronAutoXML_v2_Windows
        path: dist/HebronAutoXML_v2.exe
        retention-days: 7

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: "v2.0.0-${{ github.run_number }}"
        name: "HebronAutoXML v2.0"
        body: "Executável oficial para Windows da versão HebronAutoXML."
        files: dist/HebronAutoXML_v2.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
