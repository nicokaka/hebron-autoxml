name: Build and Release Windows

on:
  push:
    tags:
      - 'v*'  # Dispara automaticamente quando você publicar uma tag, ex: git push origin v2.0.0

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Executar Testes de Regressão
        env:
          PYTHONPATH: .
        run: |
          python -m unittest discover -s tests -v

      - name: Build com PyInstaller (OneDir via spec)
        run: |
          pyinstaller --noconfirm HebronAutoXML.spec

      - name: Instalar Inno Setup 6
        run: |
          choco install innosetup --yes --no-progress
        shell: powershell

      - name: Compilar Instalador (Inno Setup)
        run: |
          New-Item -ItemType Directory -Path "Output" -Force | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\hebron_installer.iss
        shell: powershell

      - name: Criar Release e Upload Instalador
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Output/HebronAutoXML_v2.0_Setup.exe
          name: HebronAutoXML ${{ github.ref_name }}
          body: |
            ## HebronAutoXML ${{ github.ref_name }}

            Processador automático de XMLs fiscais brasileiros (NF-e / CT-e).

            ### Como instalar
            1. Baixe o `HebronAutoXML_v2.0_Setup.exe` abaixo
            2. Execute o instalador (não precisa de permissão de administrador)
            3. Clique em avançar e pronto — aparece no Menu Iniciar e no Desktop se quiser

            ### Requisitos
            - Windows 10 ou superior (64-bit)
            - Certificado digital A1 (`.pfx`) para o modo Download SEFAZ
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
